<style>
body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:#FFFDF5;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans",sans-serif;}
.box{border:3px solid #111;background:#FFE600;box-shadow:5px 5px 0 #111;border-radius:16px;
  padding:26px 24px;width:min(360px,86vw);text-align:center;}
.box h1{margin:0 0 14px;font-size:22px;}
.box input{width:100%;border:3px solid #111;border-radius:10px;padding:11px 13px;font-size:16px;
  box-sizing:border-box;background:#fff;margin-bottom:12px;}
.box label{display:flex;gap:7px;align-items:center;justify-content:center;font-size:13px;font-weight:700;margin-bottom:14px;}
.box button{border:3px solid #111;background:#fff;font-weight:800;font-size:16px;border-radius:10px;
  padding:11px 16px;width:100%;cursor:pointer;box-shadow:2px 2px 0 #111;}
.box button:active{transform:translate(2px,2px);box-shadow:none;}
.err{color:#A32D2D;font-size:13px;font-weight:700;min-height:18px;margin-top:10px;}
</style></head><body>

const KEY = 'cm_pw';
function b64(s){return Uint8Array.from(atob(s),c=>c.charCodeAt(0));}
async function decrypt(pw){
  const enc=new TextEncoder();
  const km=await crypto.subtle.importKey('raw',enc.encode(pw),'PBKDF2',false,['deriveKey']);
  const key=await crypto.subtle.deriveKey(
    {name:'PBKDF2',salt:b64(ENC.salt),iterations:ENC.iter,hash:'SHA-256'},
    km,{name:'AES-GCM',length:256},false,['decrypt']);
  const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64(ENC.iv)},key,b64(ENC.ct));
  return new TextDecoder().decode(pt);
}
async function unlock(pw,remember){
  try{
    const html=await decrypt(pw);
    if(remember) localStorage.setItem(KEY,pw);
    document.open();document.write(html);document.close();
  }catch(e){
    localStorage.removeItem(KEY);
    document.getElementById('err').textContent='パスワードが違うみたい';
  }
}
document.getElementById('go').onclick=()=>unlock(document.getElementById('pw').value,document.getElementById('remember').checked);
document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('go').click();});
const saved=localStorage.getItem(KEY);
if(saved){unlock(saved,true);}else{document.getElementById('pw').focus();}
</script></body></html>
