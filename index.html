<title>🛠️ ユウキの作ったものメニュー</title>
<style>
:root{--ink:#111;--paper:#FFFDF5;--accent:#FFE600;--shadow:4px 4px 0 var(--ink);}
*{box-sizing:border-box;}
body{margin:0;background:var(--paper);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;
  padding:24px 16px 64px;}
.wrap{max-width:1000px;margin:0 auto;}
header.top{border:3px solid var(--ink);background:var(--accent);box-shadow:var(--shadow);
  border-radius:14px;padding:18px 22px;margin-bottom:22px;}
header.top h1{margin:0;font-size:30px;letter-spacing:.5px;}
header.top p{margin:6px 0 0;font-size:13px;font-weight:600;}
.cta{display:flex;flex-wrap:wrap;gap:10px;margin-top:12px;}
.cta-btn{border:3px solid var(--ink);background:#fff;color:var(--ink);font-weight:800;font-size:14px;
  border-radius:10px;padding:9px 15px;cursor:pointer;box-shadow:2px 2px 0 var(--ink);}
.cta-btn.primary{background:var(--ink);color:var(--accent);}
.cta-btn:active{transform:translate(2px,2px);box-shadow:none;}
.skillbox{margin-top:14px;border:3px solid var(--ink);background:#fff;border-radius:12px;padding:12px;}
.skillbox .ttl{font-size:12px;font-weight:800;margin-bottom:8px;}
.skgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.skf{display:flex;flex-direction:column;gap:3px;min-width:0;}
.skf label{font-size:11px;font-weight:800;color:#555;}
.skf .req{color:#A32D2D;}
.skf input{border:2px solid var(--ink);border-radius:7px;padding:6px 8px;font-size:13px;width:100%;
  box-sizing:border-box;background:#fff;}
@media(max-width:560px){.skgrid{grid-template-columns:repeat(2,1fr);}}
.controls{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:20px;}
#q{flex:1;min-width:200px;border:3px solid var(--ink);border-radius:10px;padding:10px 14px;
  font-size:15px;background:#fff;box-shadow:var(--shadow);}
.chip{border:3px solid var(--ink);background:#fff;border-radius:999px;padding:6px 13px;
  font-size:13px;font-weight:700;cursor:pointer;user-select:none;}
.chip.on{background:var(--ink);color:var(--accent);}
.cat{margin:26px 0 12px;display:flex;align-items:center;gap:10px;}
.cat h2{display:inline-block;margin:0;font-size:19px;background:var(--ink);color:var(--accent);
  padding:5px 14px;border-radius:8px;transform:rotate(-1deg);}
.cat .count{font-size:13px;font-weight:700;color:#666;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;}
.card{border:3px solid var(--ink);background:#fff;border-radius:14px;box-shadow:var(--shadow);
  padding:16px;display:flex;flex-direction:column;gap:8px;transition:transform .08s;}
.card:hover{transform:translate(-2px,-2px);box-shadow:6px 6px 0 var(--ink);}
.card .h{display:flex;align-items:flex-start;gap:10px;}
.card .emoji{font-size:26px;line-height:1;}
.card .name{font-size:17px;font-weight:800;margin:0;flex:1;}
.badge{align-self:flex-start;font-size:11px;font-weight:800;color:#fff;border:2px solid var(--ink);
  border-radius:999px;padding:2px 9px;white-space:nowrap;}
.one{font-size:13.5px;line-height:1.5;margin:0;color:#222;flex:1;}
.tags{display:flex;flex-wrap:wrap;gap:5px;}
.tag{font-size:10.5px;font-weight:700;background:#f1efe8;border:1.5px solid #ccc;border-radius:6px;
  padding:1px 7px;color:#555;}
.path{font-size:10.5px;color:#999;font-family:ui-monospace,Menlo,monospace;word-break:break-all;}
.go{margin-top:4px;display:inline-flex;align-items:center;justify-content:center;gap:6px;
  border:3px solid var(--ink);background:var(--accent);color:var(--ink);font-weight:800;
  font-size:13.5px;border-radius:10px;padding:9px 12px;cursor:pointer;text-decoration:none;
  box-shadow:2px 2px 0 var(--ink);}
.go:active{transform:translate(2px,2px);box-shadow:none;}
.go.muted{background:#fff;}
.empty{text-align:center;color:#999;font-weight:700;padding:40px;}
#toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(80px);
  background:var(--ink);color:var(--accent);font-weight:800;border-radius:10px;padding:12px 20px;
  box-shadow:var(--shadow);opacity:0;transition:.25s;z-index:9;font-size:14px;}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
footer{margin-top:40px;text-align:center;font-size:12px;color:#aaa;}
</style></head>

, "status": "休止", "oneliner": "設定6の台を効率よく見つけるためのデータ解析ツール", "tags": ["データ解析", "休止中"], "launch": {"type": "claude", "label": "再開して使う", "value": "スロット設定6推測ツール(slot_analyzer)を久しぶりに使いたい。現状と使い方を教えて。"}}, {"id": "wifi-switch", "emoji": "📶", "name": "WiFi自動切り替えシステム", "category": "ツール・分析", "status": "稼働中", "oneliner": "Canalpalace Sharehaus でのWiFiを自動で切り替えるシステム", "tags": ["ネットワーク", "自動"], "launch": {"type": "none", "value": ""}}, {"id": "akiba-tour-shiori", "emoji": "🗾", "name": "秋葉原ツアーしおり生成", "category": "自作スキル", "status": "完成", "oneliner": "ゲストのフォーム回答＋予約情報から、専用ツアー案・日英のしおり・サプライズギフト案を一式作るスキル", "tags": ["スキル", "ツアー"], "launch": {"type": "skill", "label": "Claudeに頼む", "value": "新しいツアー予約のゲストのしおりを作って。"}}, {"id": "project-dossier", "emoji": "📄", "name": "プロジェクト・ドシエ", "category": "自作スキル", "status": "完成", "oneliner": "1つのプロジェクトを成果＋現状＋次の一手のA4縦PDF1冊にまとめるスキル", "tags": ["スキル", "PDF"], "launch": {"type": "skill", "label": "Claudeに頼む", "value": "このプロジェクトをドシエPDFにまとめて。"}}, {"id": "skill-station", "emoji": "🛠️", "name": "スキル製造ステーション", "category": "自作スキル", "status": "完成", "oneliner": "新しいスキルを作りたいときの入口。パネルから設計→下書き→テスト→改善へ", "tags": ["スキル", "メタ"], "launch": {"type": "skill", "label": "Claudeに頼む", "value": "スキル製造ステーションを開いて。"}}, {"id": "creations-menu", "emoji": "🗂️", "name": "作ったものメニュー", "category": "自作スキル", "status": "完成", "oneliner": "今まで作ったもの全部をこのメニュー表に並べて更新するスキル（＝今これ）", "tags": ["スキル", "ランチャー"], "launch": {"type": "skill", "label": "Claudeに頼む", "value": "作ったものメニューを最新に更新して。"}}, {"id": "imakoko", "emoji": "📍", "name": "imakoko", "category": "実験・お遊び", "status": "開発中", "oneliner": "位置・現在地まわりの実験アプリ", "tags": ["実験", "vite"], "launch": {"type": "claude", "label": "起動して触る", "value": "imakoko(~/workspace/imakoko)を起動して動かしたい。"}}, {"id": "tour-marketing", "emoji": "📣", "name": "秋葉原ツアー集客", "category": "実験・お遊び", "status": "開発中", "oneliner": "ツアーガイド業・秋葉原アニメツアーの集客を加速する施策置き場", "tags": ["集客", "マーケ"], "launch": {"type": "claude", "label": "続きを進める", "value": "秋葉原ツアー集客(tour-marketing)の続きを進めたい。"}}, {"id": "imairu", "emoji": "🏠", "name": "いまいる？", "category": "実験・お遊び", "status": "完成", "oneliner": "「いま家守いる？」を1クリックで確認できるミニWebアプリ（Supabase連携・GitHub Pages公開）", "tags": ["GitHub Pages", "Supabase", "お遊び"], "launch": {"type": "url", "label": "開く", "value": "https://yukitchy.github.io/imairu/"}}]};
const STATUS_COLORS = {"稼働中": "#1D9E75", "完成": "#378ADD", "開発中": "#EF9F27", "休止": "#888780", "お蔵入り": "#E24B4A"};
const STATUS_ORDER = ["稼働中","完成","開発中","休止","お蔵入り"];
let activeStatus = null, activeCat = null, query = "";

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;
  t.classList.add('show');clearTimeout(window._tt);window._tt=setTimeout(()=>t.classList.remove('show'),1900);}
function copy(text){navigator.clipboard.writeText(text).then(()=>toast('コピーしたよ ✂️ 貼り付けて起動'))
  .catch(()=>toast('コピーできなかった…'));}

function buildSkillPrompt(){
  const v=id=>{const e=document.getElementById(id);return e?(e.value||'').trim():'';};
  const p=v('sk-problem'),g=v('sk-goal'),w=v('sk-when'),o=v('sk-out');
  const parts=[];
  if(p)parts.push('【いま困っていること】'+p);
  if(g)parts.push('【こうなったら理想】'+g);
  if(w)parts.push('【使う場面・きっかけ】'+w);
  if(o)parts.push('【仕上がりのイメージ・お手本】'+o);
  if(!parts.length)
    return 'skill-creatorを始めたい。まず私の「困っていること」「理想」「使う場面」「出力イメージ」を質問で引き出して、そこからスキルを設計して。';
  return 'skill-creatorで新しいスキルを作りたい。\n'+parts.join('\n')+
    '\nこれを踏まえ、まず意図・発動条件(description)・出力形式を一緒に固めてから、下書き→テスト→改善で進めて。足りない項目は質問で補って。';
}
function launchNewSkill(){
  const prompt=buildSkillPrompt();
  // file:// (Mac local menu): launch a local Claude Code session via Terminal.
  // hosted (PC/phone): open claude.ai new chat prefilled. Always copy as fallback.
  navigator.clipboard.writeText(prompt).catch(()=>{}).finally(()=>{
    if(location.protocol==='file:'){
      toast('プロンプトをコピー＆Claude Codeを起動');
      window.location.href='launchers/new-skill.command';
    }else{
      toast('プロンプトをコピー＆claude.aiを起動');
      window.open('https://claude.ai/new?q='+encodeURIComponent(prompt),'_blank');
    }
  });
}

function launchButton(it){
  const l=it.launch||{type:'none'};
  const label=l.label|| ({url:'開く',app:'起動',command:'起動',skill:'Claudeに頼む',claude:'Claudeに頼む',none:'—'}[l.type]||'開く');
  if(l.type==='url') return `<a class="go" href="${escapeAttr(l.value)}" target="_blank" rel="noopener">▶ ${escapeHtml(label)}</a>`;
  if(l.type==='app'||l.type==='command'){
    const cmd=l.type==='app'?`open -a ${shq(l.value)}`:l.value;
    // Mac: open the generated .command; everywhere: copy fallback handled in onclick
    return `<button class="go" data-cmd="${escapeAttr(cmd)}" data-cmdfile="launchers/${escapeAttr(it.id)}.command" onclick="runLocal(this)">▶ ${escapeHtml(label)}</button>`;
  }
  if(l.type==='skill'||l.type==='claude')
    return `<button class="go muted" data-prompt="${escapeAttr(l.value)}" onclick="copy(this.dataset.prompt)">🤖 ${escapeHtml(label)}</button>`;
  return `<span class="go muted" style="cursor:default;opacity:.5">情報のみ</span>`;
}
function runLocal(btn){
  // Best effort: open the .command (works when opened from a file:// page on Mac).
  // Always also copy the command so the user can paste into a terminal if blocked.
  copy(btn.dataset.cmd);
  try{ if(location.protocol==='file:') window.location.href=btn.dataset.cmdfile; }catch(e){}
}

function escapeHtml(s){return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function escapeAttr(s){return (s||'').replace(/["&<>]/g,c=>({'"':'&quot;','&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function shq(s){return "'"+String(s).replace(/'/g,"'\\''")+"'";}

function matches(it){
  if(activeStatus && it.status!==activeStatus) return false;
  if(activeCat && it.category!==activeCat) return false;
  if(query){const hay=(it.name+' '+it.oneliner+' '+(it.tags||[]).join(' ')+' '+it.category).toLowerCase();
    if(!hay.includes(query)) return false;}
  return true;
}
function render(){
  const items=DATA.items.filter(matches);
  const cats=[...new Set(DATA.items.map(i=>i.category))];
  const root=document.getElementById('cards');root.innerHTML='';
  if(!items.length){root.innerHTML='<div class="empty">該当なし。フィルタを外してみて</div>';return;}
  cats.forEach(cat=>{
    const list=items.filter(i=>i.category===cat);if(!list.length)return;
    const sec=document.createElement('div');
    sec.innerHTML=`<div class="cat"><h2>${escapeHtml(cat)}</h2><span class="count">${list.length}個</span></div>`;
    const grid=document.createElement('div');grid.className='grid';
    list.forEach(it=>{
      const col=STATUS_COLORS[it.status]||'#888';
      const tags=(it.tags||[]).map(t=>`<span class="tag">${escapeHtml(t)}</span>`).join('');
      const d=document.createElement('div');d.className='card';
      d.innerHTML=`<div class="h"><span class="emoji">${escapeHtml(it.emoji||'🧩')}</span>
        <p class="name">${escapeHtml(it.name)}</p>
        <span class="badge" style="background:${col}">${escapeHtml(it.status||'')}</span></div>
        <p class="one">${escapeHtml(it.oneliner||'')}</p>
        ${tags?`<div class="tags">${tags}</div>`:''}
        ${it.path?`<div class="path">${escapeHtml(it.path)}</div>`:''}
        ${launchButton(it)}`;
      grid.appendChild(d);
    });
    sec.appendChild(grid);root.appendChild(sec);
  });
}
function buildChips(){
  const sw=document.getElementById('statusChips');
  STATUS_ORDER.forEach(s=>{ if(!DATA.items.some(i=>i.status===s))return;
    const c=document.createElement('span');c.className='chip';c.textContent=s;
    c.onclick=()=>{activeStatus=activeStatus===s?null:s;syncChips();render();};c.dataset.s=s;sw.appendChild(c);});
  const cw=document.getElementById('catChips');
  [...new Set(DATA.items.map(i=>i.category))].forEach(cat=>{
    const c=document.createElement('span');c.className='chip';c.textContent=cat;
    c.onclick=()=>{activeCat=activeCat===cat?null:cat;syncChips();render();};c.dataset.c=cat;cw.appendChild(c);});
}
function syncChips(){
  document.querySelectorAll('#statusChips .chip').forEach(c=>c.classList.toggle('on',c.dataset.s===activeStatus));
  document.querySelectorAll('#catChips .chip').forEach(c=>c.classList.toggle('on',c.dataset.c===activeCat));
}
document.getElementById('q').addEventListener('input',e=>{query=e.target.value.toLowerCase().trim();render();});
buildChips();render();
</script></body></html>
